<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClawAnywhere</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .status-dot.green { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .status-dot.yellow { background: #eab308; box-shadow: 0 0 8px #eab308; }
    .status-dot.red { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    #debugLog { font-size: 10px; color: #64748b; max-height: 60px; overflow-y: auto; }
  </style>
</head>
<body class="h-screen flex flex-col items-center justify-center p-6">
  <div class="text-center space-y-5 max-w-sm w-full">
    <h1 class="text-2xl font-bold">🐾 OpenClawAnywhere</h1>

    <!-- 状态面板 -->
    <div class="bg-slate-800 rounded-xl p-5 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-sm text-slate-300">网关状态</span>
        <div class="flex items-center gap-2">
          <span class="status-dot green"></span>
          <span class="text-xs text-slate-400">运行中</span>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-slate-300">隧道状态</span>
        <div class="flex items-center gap-2">
          <span class="status-dot" id="tunnelDot"></span>
          <span class="text-xs text-slate-400" id="tunnelStatus">等待连接...</span>
        </div>
      </div>
    </div>

    <!-- 二维码区域 -->
    <div id="qrSection" class="hidden">
      <div class="bg-white rounded-xl p-4 inline-block">
        <canvas id="qrCanvas"></canvas>
      </div>
      <p class="text-sm text-slate-400 mt-3">手机扫码连接</p>
      <p class="text-xs text-slate-500 mt-1 break-all px-2" id="tunnelUrlText"></p>
    </div>

    <!-- 等待提示 -->
    <div id="waitingSection">
      <p class="text-sm text-slate-500 animate-pulse">正在建立隧道，请稍候...</p>
    </div>

    <!-- 开机自启 -->
    <div class="bg-slate-800 rounded-xl p-5">
      <label class="flex items-center justify-between cursor-pointer">
        <span class="text-sm text-slate-300">开机自启</span>
        <input type="checkbox" id="autostartToggle" class="w-5 h-5 accent-blue-500" />
      </label>
    </div>

    <div id="debugLog"></div>
  </div>

<script>
  function dbg(msg) {
    const el = document.getElementById('debugLog');
    el.textContent += msg + '\n';
    console.log('[desktop]', msg);
  }

  function initTauri() {
    const tauri = window.__TAURI__;
    if (!tauri) {
      dbg('⚠ window.__TAURI__ 不可用');
      return;
    }

    dbg('✓ Tauri API 已加载');

    // Tauri 2: event API 在 tauri.event 下
    const eventApi = tauri.event;
    const coreApi = tauri.core;

    if (!eventApi || !eventApi.listen) {
      dbg('⚠ event.listen 不可用, keys: ' + Object.keys(tauri).join(','));
      return;
    }

    dbg('✓ 正在监听 tunnel_ready 事件...');

    eventApi.listen('tunnel_ready', (ev) => {
      dbg('收到事件: ' + JSON.stringify(ev.payload).substring(0, 100));
      try {
        const data = typeof ev.payload === 'string' ? JSON.parse(ev.payload) : ev.payload;
        showQRCode(data.fullUrl, data.tunnelUrl);
      } catch (e) {
        dbg('解析失败: ' + e.message);
      }
    });

    // 轮询 get_tunnel_info 作为后备（解决事件时序问题）
    if (coreApi && coreApi.invoke) {
      initAutostart(coreApi.invoke);
      pollTunnelInfo(coreApi.invoke);
    }
  }

  function pollTunnelInfo(invoke) {
    let attempts = 0;
    const maxAttempts = 60; // 最多轮询 2 分钟
    const timer = setInterval(async () => {
      // 如果二维码已显示，停止轮询
      if (!document.getElementById('qrSection').classList.contains('hidden')) {
        clearInterval(timer);
        return;
      }
      attempts++;
      if (attempts > maxAttempts) {
        dbg('轮询超时，停止');
        clearInterval(timer);
        return;
      }
      try {
        const info = await invoke('get_tunnel_info');
        if (info) {
          dbg('轮询获取到隧道信息');
          const data = typeof info === 'string' ? JSON.parse(info) : info;
          showQRCode(data.fullUrl, data.tunnelUrl);
          clearInterval(timer);
        }
      } catch (e) {
        // 静默忽略，继续轮询
      }
    }, 2000);
  }

  function showQRCode(fullUrl, tunnelUrl) {
    dbg('显示二维码: ' + tunnelUrl);
    document.getElementById('tunnelDot').className = 'status-dot green';
    document.getElementById('tunnelStatus').textContent = '已连接';
    document.getElementById('tunnelUrlText').textContent = tunnelUrl;
    document.getElementById('waitingSection').classList.add('hidden');
    document.getElementById('qrSection').classList.remove('hidden');

    QRCode.toCanvas(document.getElementById('qrCanvas'), fullUrl, {
      width: 220,
      margin: 1,
      color: { dark: '#0f172a', light: '#ffffff' }
    }, (err) => {
      if (err) dbg('QR 渲染失败: ' + err.message);
    });
  }

  async function initAutostart(invoke) {
    const toggle = document.getElementById('autostartToggle');
    try {
      const enabled = await invoke('get_autostart_status');
      toggle.checked = enabled;
    } catch (e) {
      dbg('自启状态获取失败: ' + e);
    }

    toggle.addEventListener('change', async () => {
      try {
        const newState = await invoke('toggle_autostart');
        toggle.checked = newState;
      } catch (e) {
        dbg('切换自启失败: ' + e);
      }
    });
  }

  // 等 DOM 和 Tauri 注入完成后初始化
  if (document.readyState === 'complete') {
    initTauri();
  } else {
    window.addEventListener('DOMContentLoaded', initTauri);
  }
</script>
</body>
</html>
