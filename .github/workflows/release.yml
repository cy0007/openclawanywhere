name: Release — Build & Publish

# 触发条件：推送 v* 标签时自动构建
on:
  push:
    tags:
      - 'v*'

# 也可以手动触发（方便调试）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Step 1: 创建 GitHub Release（仅执行一次）
  # ──────────────────────────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: 获取版本号
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 创建 Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `OpenClawAnywhere ${{ steps.version.outputs.version }}`,
              body: `## 🐾 OpenClawAnywhere ${{ steps.version.outputs.version }}\n\n下载对应平台的安装包，双击即用。\n\n### 安装包\n- **macOS** (Apple Silicon): \`.dmg\`\n- **macOS** (Intel): \`.dmg\`\n- **Windows**: \`.msi\` / \`.exe\`\n- **Linux**: \`.deb\` / \`.AppImage\`\n\n### 使用方式\n1. 下载并安装\n2. 启动 App\n3. 手机扫码连接\n\n无需安装 Node.js，无需命令行。`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ──────────────────────────────────────────────────────────────────────────
  # Step 2: 三平台并行构建
  # ──────────────────────────────────────────────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,updater

          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app,updater

          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: ""

          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node.js 环境 ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # ── pkg (Node.js → 单文件二进制) ──
      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      # ── Rust 环境 ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Linux 依赖 ──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── 下载 cloudflared ──
      - name: Download cloudflared (macOS arm64)
        if: matrix.rust_target == 'aarch64-apple-darwin'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/cf.tgz https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz
          tar xzf /tmp/cf.tgz -C src-tauri/binaries/
          mv src-tauri/binaries/cloudflared src-tauri/binaries/cloudflared-aarch64-apple-darwin
          chmod +x src-tauri/binaries/cloudflared-aarch64-apple-darwin

      - name: Download cloudflared (macOS x64)
        if: matrix.rust_target == 'x86_64-apple-darwin'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/cf.tgz https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-amd64.tgz
          tar xzf /tmp/cf.tgz -C src-tauri/binaries/
          mv src-tauri/binaries/cloudflared src-tauri/binaries/cloudflared-x86_64-apple-darwin
          chmod +x src-tauri/binaries/cloudflared-x86_64-apple-darwin

      - name: Download cloudflared (Linux x64)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x src-tauri/binaries/cloudflared-x86_64-unknown-linux-gnu

      - name: Download cloudflared (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" `
            -OutFile "src-tauri/binaries/cloudflared-x86_64-pc-windows-msvc.exe"

      # ── 打包 Node.js Sidecar ──
      - name: Build Node.js sidecar (macOS arm64)
        if: matrix.rust_target == 'aarch64-apple-darwin'
        run: |
          pkg run.js --target node18-macos-arm64 \
            --output src-tauri/binaries/openclaw-gateway-aarch64-apple-darwin \
            --compress GZip

      - name: Build Node.js sidecar (macOS x64)
        if: matrix.rust_target == 'x86_64-apple-darwin'
        run: |
          pkg run.js --target node18-macos-x64 \
            --output src-tauri/binaries/openclaw-gateway-x86_64-apple-darwin \
            --compress GZip

      - name: Build Node.js sidecar (Linux x64)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          pkg run.js --target node18-linux-x64 \
            --output src-tauri/binaries/openclaw-gateway-x86_64-unknown-linux-gnu \
            --compress GZip

      - name: Build Node.js sidecar (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          pkg run.js --target node18-win-x64 `
            --output src-tauri/binaries/openclaw-gateway-x86_64-pc-windows-msvc.exe `
            --compress GZip

      # ── Tauri 构建 & 上传 ──
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ──────────────────────────────────────────────────────────────────────────
  # Step 3: 发布 Release（取消 draft 状态）
  # ──────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false,
            });